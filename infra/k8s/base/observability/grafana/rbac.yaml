apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-sa
  labels:
    app: grafana

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-config-watcher
  labels:
    app: grafana
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-config-watcher-binding
  labels:
    app: grafana
subjects:
  - kind: ServiceAccount
    name: grafana-sa
roleRef:
  kind: Role
  name: grafana-config-watcher
  apiGroup: rbac.authorization.k8s.io
